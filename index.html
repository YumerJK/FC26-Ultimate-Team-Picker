<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC 26 | Ultimate Team Picker</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#03070f;
      --panel:#0d1420cc;
      --panel-stroke:#00f0ff55;
      --neon:#00f0ff;
      --accent:#7bff7b;
      --text:#eaf6ff;
      --muted:#9cb4c8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, #11304d 0%, transparent 30%),
        radial-gradient(circle at 85% 20%, #11351f 0%, transparent 32%),
        linear-gradient(140deg, #01040a 0%, #071321 50%, #03070f 100%);
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.08) 1px, transparent 1px);
      background-size: 42px 42px;
      transform: perspective(900px) rotateX(62deg) scale(1.6);
      animation: drift 18s linear infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: 0 42px; }
    }

    .card {
      width: min(470px, 100%);
      border: 1px solid var(--panel-stroke);
      border-radius: 22px;
      padding: 22px 22px 20px;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, #0f1927f2 0%, #0a121de6 100%);
      box-shadow: 0 25px 80px #00000099, 0 0 40px #00f0ff22 inset;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 22px;
      background: linear-gradient(120deg, transparent 10%, #00f0ff22 50%, transparent 90%);
      pointer-events: none;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .logo-wrap {
      width: 92px;
      height: 92px;
      border-radius: 14px;
      border: 1px solid #00f0ff66;
      background: #02060ecc;
      display: grid;
      place-items: center;
      box-shadow: 0 0 22px #00f0ff44;
      flex-shrink: 0;
    }

    #takim-logo {
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 0 8px #ffffff1f);
    }

    h1 {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      color: var(--neon);
      letter-spacing: .6px;
      font-size: clamp(20px, 5vw, 28px);
    }

    .stars { margin: 8px 0 2px; font-size: 16px; }
    .muted { color: var(--muted); font-size: 12px; }

    .controls {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    select, button {
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #00f0ff66;
      color: var(--text);
    }

    select {
      background: #050b14;
      padding: 12px;
      outline: none;
    }

    button {
      background: linear-gradient(100deg, var(--accent), #7bffcc);
      color: #03120f;
      font-weight: 700;
      padding: 12px 14px;
      border: none;
      cursor: pointer;
      min-width: 132px;
      transition: transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 8px 18px #54ff9255;
      grid-column: 1 / -1;
      width: 100%;
    }

    button:hover:not(:disabled) { transform: translateY(-1px) scale(1.01); }
    button:disabled { opacity: .75; cursor: wait; }

    .result {
      margin-top: 18px;
      border-top: 1px solid #00f0ff33;
      padding-top: 16px;
    }

    #takim-adi {
      margin: 0;
      font-size: clamp(22px, 6vw, 32px);
      text-transform: uppercase;
      font-family: "Orbitron", sans-serif;
      line-height: 1.1;
    }

    .lig-chip {
      margin-top: 4px;
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid #7bff7b66;
      color: #bafdc0;
      border-radius: 999px;
      font-size: 12px;
    }

    .stat {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 68px 1fr 38px;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #cce4f8;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #08111d;
      overflow: hidden;
      border: 1px solid #00f0ff22;
    }

    .fill {
      height: 100%;
      width: 0%;
      transition: width 900ms cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 0 14px #00f0ffaa;
      background: linear-gradient(90deg, #2a7dff, #00f0ff);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .d-box {
      background: #060f1bb3;
      border: 1px solid #00f0ff2e;
      border-radius: 10px;
      padding: 10px;
      min-height: 70px;
    }

    .d-box small {
      color: var(--muted);
      display: block;
      font-size: 11px;
      letter-spacing: .4px;
      margin-bottom: 4px;
    }

    .d-box span { font-size: 18px; font-weight: 700; }

    @media (max-width: 520px) {
      .controls { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="card">
    <section class="top">
      <div>
        <h1>FC 26 <span style="color:#fff">PICKER</span></h1>
        <div id="yildizlar" class="stars">⭐⭐⭐⭐⭐</div>
        <div class="muted">Kadro referansı: 2025-26 sezonu</div>
      </div>
      <div class="logo-wrap">
        <img id="takim-logo" src="https://a.espncdn.com/i/teamlogos/soccer/500/432.png" alt="Takım logosu">
      </div>
    </section>

    <section class="controls">
      <select id="lig" aria-label="Lig seçimi">
        <option value="Hepsi">TÜM LİGLER</option>
        <option value="Trendyol Süper Lig">TRENDYOL SÜPER LİG</option>
        <option value="Premier League">PREMIER LEAGUE</option>
        <option value="EFL Championship">EFL CHAMPIONSHIP</option>
        <option value="EFL League One">EFL LEAGUE ONE</option>
        <option value="EFL League Two">EFL LEAGUE TWO</option>
        <option value="LALIGA EA SPORTS">LALIGA EA SPORTS</option>
        <option value="LALIGA HYPERMOTION">LALIGA HYPERMOTION</option>
        <option value="Bundesliga">BUNDESLIGA</option>
        <option value="2. Bundesliga">2. BUNDESLIGA</option>
        <option value="3. Liga">3. LIGA</option>
        <option value="Serie A Enilive">SERIE A ENILIVE</option>
        <option value="Serie BKT">SERIE BKT</option>
        <option value="Ligue 1 McDonald’s">LIGUE 1 MCDONALD'S</option>
        <option value="Ligue 2 BKT">LIGUE 2 BKT</option>
        <option value="Liga Portugal">LIGA PORTUGAL</option>
        <option value="Eredivisie">EREDIVISIE</option>
        <option value="Pro League">PRO LEAGUE</option>
        <option value="Scottish Premiership">SCOTTISH PREMIERSHIP</option>
        <option value="Austrian Bundesliga">AUSTRIAN BUNDESLIGA</option>
        <option value="Swiss Super League">SWISS SUPER LEAGUE</option>
        <option value="3F Superliga">3F SUPERLIGA</option>
        <option value="Allsvenskan">ALLSVENSKAN</option>
        <option value="Eliteserien">ELITESERIEN</option>
        <option value="Ekstraklasa">EKSTRAKLASA</option>
        <option value="Ireland Premier Division">IRELAND PREMIER DIVISION</option>
        <option value="Romania Liga I">ROMANIA LIGA I</option>
        <option value="Major League Soccer">MAJOR LEAGUE SOCCER</option>
        <option value="Liga Profesional de Fútbol">LIGA PROFESIONAL</option>
        <option value="Roshn Saudi League">ROSHN SAUDI LEAGUE</option>
        <option value="K League 1">K LEAGUE 1</option>
        <option value="Chinese Super League">CHINESE SUPER LEAGUE</option>
        <option value="A-League Men">A-LEAGUE MEN</option>
        <option value="Indian Super League">INDIAN SUPER LEAGUE</option>
      </select>
      <select id="yildiz-filtre" aria-label="Yıldız filtresi">
        <option value="Hepsi">YILDIZ: HEPSİ</option>
        <option value="5">YILDIZ: 5</option>
        <option value="4-">YILDIZ: 4 VE ALTI</option>
        <option value="4.5+">YILDIZ: 4.5 VE ÜSTÜ</option>
      </select>
      <button id="sec-buton">TAKIMI BELİRLE</button>
    </section>

    <section class="result">
      <h2 id="takim-adi">BEKLENİYOR...</h2>
      <div id="lig-goster" class="lig-chip">-</div>

      <div class="stat">
        <div class="row">
          <span>ATAK</span>
          <div class="bar"><div id="bar-huc" class="fill"></div></div>
          <span id="val-huc">0</span>
        </div>
        <div class="row">
          <span>SAVUNMA</span>
          <div class="bar"><div id="bar-sav" class="fill"></div></div>
          <span id="val-sav">0</span>
        </div>
      </div>

      <div class="detail-grid">
        <div class="d-box"><small>DİZİLİŞ</small><span id="dizilis">-</span></div>
        <div class="d-box"><small>PİYASA DEĞERİ</small><span id="piyasa-degeri">-</span></div>
      </div>
    </section>
  </main>

  <script>
   const MARKET_VALUE_PLACEHOLDER = "GÜNCEL PİYASA DEĞERİ";
    const FALLBACK_LOGO = "https://img.icons8.com/color/120/football2.png";

    function buildTeamBadge(teamName) {
      const words = teamName.split(" ").filter(Boolean);
      const initials = words.length === 1
        ? words[0].slice(0, 3).toUpperCase()
        : words.slice(0, 3).map(part => part[0]).join("").toUpperCase();

      const svg = `
        <svg xmlns='http://www.w3.org/2000/svg' width='220' height='220' viewBox='0 0 220 220'>
          <defs>
            <linearGradient id='g' x1='0' x2='1' y1='0' y2='1'>
              <stop offset='0%' stop-color='#0f1f38'/>
              <stop offset='100%' stop-color='#0a8f7b'/>
            </linearGradient>
          </defs>
          <rect x='10' y='10' width='200' height='200' rx='28' fill='url(#g)' stroke='#9dfcff' stroke-width='8'/>
          <text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' fill='#e9feff'
                font-family='Arial, sans-serif' font-size='62' font-weight='700'>${initials || "FC"}</text>
        </svg>
      `;

      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    const logoCache = new Map();
    let espnLogoIndexPromise = null;

    const TEAM_ALIASES = {
      "PSG": ["Paris Saint-Germain"],
      "KÖLN": ["FC Cologne", "1. FC Köln"],
      "SPARTA ROTTERDAM": ["Sparta Rotterdam"],
      "GO AHEAD EAGLES": ["Go Ahead Eagles"],
      "RB LEIPZIG": ["RB Leipzig"],
      "MAINZ 05": ["Mainz"],
      "AUXERRE": ["AJ Auxerre"],
      "AZ ALKMAAR": ["AZ"],
      "NICE": ["OGC Nice"],
      "LE HAVRE": ["Le Havre AC"],
      "METZ": ["FC Metz"],
      "FATİH KARAGÜMRÜK": ["Fatih Karagumruk"],
      "RİZESPOR": ["Çaykur Rizespor", "Caykur Rizespor"],
    "BAŞAKŞEHİR": ["Istanbul Basaksehir"],
      "MANCHESTER UNITED": ["Manchester Utd", "Man United"],
      "MANCHESTER CITY": ["Man City"],
      "INTER": ["Inter Milan"],
      "MILAN": ["AC Milan"],
      "ATLETICO MADRID": ["Atlético Madrid", "Atletico de Madrid"]    };

    function normalizeName(name = "") {
      return name
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    async function getEspnLogoIndex() {
      if (espnLogoIndexPromise) return espnLogoIndexPromise;

      const leagueCodes = ["tur.1", "eng.1", "esp.1", "ita.1", "ger.1", "fra.1", "ned.1"];
      espnLogoIndexPromise = (async () => {
        const map = new Map();

        await Promise.all(
          leagueCodes.map(async (code) => {
            try {
              const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${code}/teams`);
              const data = await res.json();
              const teams = data?.sports?.[0]?.leagues?.[0]?.teams || [];

              teams.forEach((entry) => {
                const t = entry.team || entry;
                const id = t.id;
                const names = [t.displayName, t.name, t.shortDisplayName, t.abbreviation].filter(Boolean);
                names.forEach((n) => map.set(normalizeName(n), id));
              });
            } catch (_) {
              // league fetch fail: keep going
            }
          })
        );

        return map;
      })();

      return espnLogoIndexPromise;
    }

    async function fetchLogoFromEspn(teamName) {
      const index = await getEspnLogoIndex();
      const aliases = TEAM_ALIASES[teamName] || [];
      const candidates = [teamName, ...aliases];

      for (const candidate of candidates) {
        const id = index.get(normalizeName(candidate));
        if (id) return `https://a.espncdn.com/i/teamlogos/soccer/500/${id}.png`;
      }
      return null;
    }

    const LEAGUE_CODE_MAP = {
      "Trendyol Süper Lig": "tur.1",
      "Premier League": "eng.1",
      "EFL Championship": "eng.2",
      "EFL League One": "eng.3",
      "EFL League Two": "eng.4",
      "LALIGA EA SPORTS": "esp.1",
      "LALIGA HYPERMOTION": "esp.2",
      "Bundesliga": "ger.1",
      "2. Bundesliga": "ger.2",
      "3. Liga": "ger.3",
      "Serie A Enilive": "ita.1",
      "Serie BKT": "ita.2",
      "Ligue 1 McDonald’s": "fra.1",
      "Ligue 2 BKT": "fra.2",
      "Liga Portugal": "por.1",
      "Eredivisie": "ned.1",
      "Pro League": "bel.1",
      "Scottish Premiership": "sco.1",
      "Austrian Bundesliga": "aut.1",
      "Swiss Super League": "sui.1",
      "3F Superliga": "den.1",
      "Allsvenskan": "swe.1",
      "Eliteserien": "nor.1",
      "Ekstraklasa": "pol.1",
      "Ireland Premier Division": "irl.1",
      "Romania Liga I": "rou.1",
      "Major League Soccer": "usa.1",
      "Liga Profesional de Fútbol": "arg.1",
      "Roshn Saudi League": "ksa.1",
      "K League 1": "kor.1",
      "Chinese Super League": "chn.1",
      "A-League Men": "aus.1",
      "Indian Super League": "ind.1"
    };

    const dynamicLeagueCache = new Map();

    function makeRatingFromIndex(index, total) {
      const ratio = total > 0 ? index / total : 1;
      if (ratio < 0.15) return 5;
      if (ratio < 0.45) return 4.5;
      if (ratio < 0.75) return 4;
      return 3.5;
    }

    function hashNum(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) % 9973;
      return h;
    }

    function makeTeamFromEspn(team, ligName, idx, total) {
      const yildiz = makeRatingFromIndex(idx, total);
      const seed = hashNum(team.displayName || team.name || String(team.id || idx));
      const hucum = 70 + Math.round(yildiz * 3) + (seed % 8);
      const savunma = 68 + Math.round(yildiz * 3) + ((seed >> 1) % 8);
      const dizilisler = ["4-2-3-1", "4-3-3", "3-4-2-1", "4-4-2", "3-5-2"];

      return {
        ad: (team.displayName || team.name || `TEAM ${idx + 1}`).toUpperCase(),
        lig: ligName,
        yildiz,
        hucum: Math.min(95, hucum),
        savunma: Math.min(92, savunma),
        dizilis: dizilisler[seed % dizilisler.length],
         kilit: MARKET_VALUE_PLACEHOLDER,
        logo: team.id ? `https://a.espncdn.com/i/teamlogos/soccer/500/${team.id}.png` : ""
      };
    }

    async function fetchLeagueTeamsByName(ligName) {
      if (dynamicLeagueCache.has(ligName)) return dynamicLeagueCache.get(ligName);

      const code = LEAGUE_CODE_MAP[ligName];
      if (!code) return [];

      try {
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${code}/teams`);
        const data = await res.json();
        const rawTeams = data?.sports?.[0]?.leagues?.[0]?.teams || [];
        const teams = rawTeams.map((entry) => entry.team || entry).filter(Boolean);
        const mapped = teams.map((t, i) => makeTeamFromEspn(t, ligName, i, teams.length));
        dynamicLeagueCache.set(ligName, mapped);
        return mapped;
      } catch (_) {
        return [];
      }
    }

    async function fetchLogoFromWikidata(teamName) {
      const searchCandidates = [
        teamName,
        `${teamName} football club`,
        `${teamName} soccer club`
      ];

      for (const candidate of searchCandidates) {
        try {
          const searchRes = await fetch(
            `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(candidate)}&language=en&format=json&limit=5&origin=*`
          );
          const searchData = await searchRes.json();
          const entities = searchData?.search || [];

          for (const entity of entities) {
            const id = entity.id;
            const entityRes = await fetch(
              `https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${id}&props=claims&format=json&origin=*`
            );
            const entityData = await entityRes.json();
            const claims = entityData?.entities?.[id]?.claims;
            const logoClaim = claims?.P154?.[0];
            const logoName = logoClaim?.mainsnak?.datavalue?.value;

            if (logoName) {
              return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(logoName)}`;
            }
          }
        } catch (_) {
          // no-op: try next candidate
        }
      }

      return null;
    }
const marketValueCache = new Map();
    let marketValuePropertyIdPromise = null;

    async function getMarketValuePropertyId() {
      if (marketValuePropertyIdPromise) return marketValuePropertyIdPromise;
      marketValuePropertyIdPromise = (async () => {
        try {
          const res = await fetch(
            "https://www.wikidata.org/w/api.php?action=wbsearchentities&search=market%20value&language=en&type=property&format=json&limit=10&origin=*"
          );
          const data = await res.json();
          const props = data?.search || [];
          const exact = props.find((p) => (p.label || "").toLowerCase() === "market value");
          return (exact || props[0])?.id || null;
        } catch (_) {
          return null;
        }
      })();
      return marketValuePropertyIdPromise;
    }

    function formatCurrencyAmount(amountRaw) {
      const amount = Number(amountRaw);
      if (!Number.isFinite(amount)) return null;
      return new Intl.NumberFormat("tr-TR", {
        maximumFractionDigits: 1,
        notation: "compact"
      }).format(amount);
    }

    async function fetchMarketValueFromWikidata(teamName) {
      const aliases = TEAM_ALIASES[teamName] || [];
      const searchCandidates = [teamName, ...aliases, `${teamName} football club`, `${teamName} soccer club`];
      const propertyId = await getMarketValuePropertyId();
      if (!propertyId) return null;

      for (const candidate of searchCandidates) {
        try {
          const searchRes = await fetch(
            `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(candidate)}&language=en&format=json&limit=5&origin=*`
          );
          const searchData = await searchRes.json();
          const entities = searchData?.search || [];

          for (const entity of entities) {
            const entityId = entity.id;
            const entityRes = await fetch(
              `https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${entityId}&props=claims&format=json&origin=*`
            );
            const entityData = await entityRes.json();
            const claims = entityData?.entities?.[entityId]?.claims || {};
            const marketClaim = claims?.[propertyId]?.[0];
            const rawAmount = marketClaim?.mainsnak?.datavalue?.value?.amount;
            const unit = marketClaim?.mainsnak?.datavalue?.value?.unit || "";
            const formatted = formatCurrencyAmount(rawAmount);
            if (!formatted) continue;

            const currency = unit.includes("Q4917") ? "USD" : "";
            return currency ? `${formatted} ${currency}` : formatted;
          }
        } catch (_) {
          // no-op: try next candidate
        }
      }

      return null;
    }

    async function setTeamMarketValue(team, isFinalSelection) {
      const fallback = team.kilit || MARKET_VALUE_PLACEHOLDER;
      el.piyasaDegeri.textContent = fallback;

      if (!isFinalSelection) return;
      if (marketValueCache.has(team.ad)) {
        const cached = marketValueCache.get(team.ad);
        if (el.ad.textContent === team.ad) el.piyasaDegeri.textContent = cached;
        return;
      }

      const liveMarketValue = await fetchMarketValueFromWikidata(team.ad);
      if (liveMarketValue) {
        marketValueCache.set(team.ad, liveMarketValue);
        if (el.ad.textContent === team.ad) el.piyasaDegeri.textContent = liveMarketValue;
      }
    }


    async function setTeamLogo(team, isFinalSelection) {
      const safeFallback = team.logo || buildTeamBadge(team.ad) || FALLBACK_LOGO;
      el.logo.src = safeFallback;

      if (!isFinalSelection) return;
      if (logoCache.has(team.ad)) {
        const cached = logoCache.get(team.ad);
        if (el.ad.textContent === team.ad) el.logo.src = cached;
        return;
      }

      const liveLogo = await fetchLogoFromEspn(team.ad) || await fetchLogoFromWikidata(team.ad);
      if (liveLogo) {
        logoCache.set(team.ad, liveLogo);
        if (el.ad.textContent === team.ad) el.logo.src = liveLogo;
      }
    }

    const database = [

    const databaseSafe = database.map(team => ({
      ...team,
       kilit: MARKET_VALUE_PLACEHOLDER,
      logo: team.logo || buildTeamBadge(team.ad)
    }));

    const el = {
      btn: document.getElementById("sec-buton"),
      lig: document.getElementById("lig"),
      yildizFiltre: document.getElementById("yildiz-filtre"),
      ad: document.getElementById("takim-adi"),
      ligGoster: document.getElementById("lig-goster"),
      logo: document.getElementById("takim-logo"),
      huc: document.getElementById("val-huc"),
      sav: document.getElementById("val-sav"),
      barHuc: document.getElementById("bar-huc"),
      barSav: document.getElementById("bar-sav"),
      dizilis: document.getElementById("dizilis"),
    piyasaDegeri: document.getElementById("piyasa-degeri"),
      yildizlar: document.getElementById("yildizlar")
    };

    el.logo.addEventListener("error", () => {
      const currentName = el.ad.textContent?.trim() || "FC";
      el.logo.src = buildTeamBadge(currentName) || FALLBACK_LOGO;
    });

    el.btn.addEventListener("click", async () => {
      const filt = el.lig.value;
      const yildizFiltre = el.yildizFiltre.value;
      el.btn.disabled = true;
      el.btn.textContent = "YÜKLENİYOR...";

      let sourcePool = [];
      if (filt === "Hepsi") {
        const allLeagues = Object.keys(LEAGUE_CODE_MAP);
        const pools = await Promise.all(allLeagues.map((l) => fetchLeagueTeamsByName(l)));
        sourcePool = pools.flat();
      } else {
        sourcePool = await fetchLeagueTeamsByName(filt);
      }

      const fallbackPool = databaseSafe.filter((t) => filt === "Hepsi" || t.lig === filt);
      const basePool = sourcePool.length ? sourcePool : fallbackPool;

      const pool = basePool.filter((t) => {
        if (yildizFiltre === "5") return t.yildiz >= 5;
        if (yildizFiltre === "4-") return t.yildiz <= 4;
        if (yildizFiltre === "4.5+") return t.yildiz >= 4.5;
        return true;
      });

      if (!pool.length) {
        alert("Bu filtrede takım bulunamadı.");
        el.btn.disabled = false;
        el.btn.textContent = "TAKIMI BELİRLE";
        return;
      }

      el.btn.textContent = "SEÇİLİYOR...";
      let ticks = 0;

      const roulette = setInterval(() => {
        const randomTeam = pool[Math.floor(Math.random() * pool.length)];
        hydrate(randomTeam, false);
        ticks += 1;

        if (ticks >= 18) {
          clearInterval(roulette);
          const final = pool[Math.floor(Math.random() * pool.length)];
          hydrate(final, true);
          el.btn.disabled = false;
          el.btn.textContent = "TAKIMI BELİRLE";
        }
      }, 70);
    });

    function hydrate(team, animateBars) {
      el.ad.textContent = team.ad;
      el.ligGoster.textContent = team.lig;
      setTeamLogo(team, animateBars);
      el.huc.textContent = team.hucum;
      el.sav.textContent = team.savunma;
      el.dizilis.textContent = team.dizilis;
    setTeamMarketValue(team, animateBars);

      const full = Math.floor(team.yildiz);
      const half = team.yildiz % 1 !== 0;
      el.yildizlar.textContent = "⭐".repeat(full) + (half ? "✯" : "");

      el.barHuc.style.width = "0%";
      el.barSav.style.width = "0%";
      if (animateBars) {
        setTimeout(() => {
          el.barHuc.style.width = `${team.hucum}%`;
          el.barSav.style.width = `${team.savunma}%`;
        }, 80);
      }
    }
